<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Oracle 2026 — Decoder of Hidden Predictions</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="confetti" aria-hidden="true"></canvas>

  <div class="container">
    <header class="hero">
      <div class="lang-switch" role="group" aria-label="Language">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="de" type="button">DE</button>
      </div>
      <h1 data-i18n="title">World Cup Oracle 2026</h1>
      <p data-i18n="subtitle">Paste a sentence or seed a name — the oracle reads hidden predictions for the 48-team field.</p>
    </header>

    <div class="input-shell">
      <div class="mode-tabs" role="tablist">
        <button class="mode-tab active" data-mode="text" data-i18n="tabText" type="button">Scan Text</button>
        <button class="mode-tab" data-mode="seed" data-i18n="tabSeed" type="button">Personal Seed</button>
      </div>

      <div id="text-panel">
        <label class="field-label" for="text-input" data-i18n="textLabel">Paste any text — tweet, headline, message</label>
        <textarea id="text-input" data-i18n-attr="placeholder:textPlaceholder"></textarea>
      </div>

      <div id="seed-panel" hidden>
        <label class="field-label" for="seed-input" data-i18n="seedLabel">Enter a seed — name + birthday, lucky phrase, anything</label>
        <input id="seed-input" type="text" data-i18n-attr="placeholder:seedPlaceholder" />
      </div>

      <div class="actions">
        <span class="hint" data-i18n="shortcutHint">Tip: ⌘/Ctrl + Enter to decode</span>
        <button id="decode-btn" class="decode-btn" data-i18n="decode" type="button">Decode</button>
      </div>
    </div>

    <div id="output" aria-live="polite"></div>

    <footer class="foot" data-i18n="foot">
      Deterministic readings · 96 years of finals baked in · for amusement, not for betting.
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
