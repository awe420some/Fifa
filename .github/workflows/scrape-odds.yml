name: Scrape bookmaker odds

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes — pre-tournament cadence
  workflow_dispatch:           # also runnable manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape-odds
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install Playwright + Chromium
        run: |
          npm init -y > /dev/null
          npm install playwright@1.56.1 --no-save --silent
          npx playwright install chromium --with-deps

      - name: Run team-odds scraper
        id: scrape
        run: node scripts/scrape-bookmakers.mjs
        continue-on-error: true

      - name: Run player-prop scraper
        id: props
        run: node scripts/scrape-player-props.mjs
        continue-on-error: true

      - name: Run forecast snapshot
        id: forecast
        run: node scripts/snapshot-forecast.mjs
        continue-on-error: true

      - name: Write freshness manifest
        id: freshness
        run: node scripts/write-freshness.mjs
        continue-on-error: true

      - name: Commit snapshots if changed
        if: steps.scrape.outcome == 'success' || steps.props.outcome == 'success' || steps.forecast.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=0
          for f in data/market-snapshot.json data/player-props-2026.json data/title-history.json data/freshness.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f"; then
              git add "$f"; changed=1
            fi
          done
          if [ "$changed" = "1" ]; then
            git commit -m "Refresh odds + props + forecast snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes to commit."
          fi
