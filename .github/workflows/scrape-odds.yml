name: Scrape bookmaker odds

on:
  schedule:
    - cron: "0 * * * *"      # hourly — keeps The Odds API free tier (500/mo) safe
  workflow_dispatch:           # also runnable manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape-odds
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with: { node-version: "22" }

      - name: Install Playwright + Chromium
        run: |
          npm init -y > /dev/null
          npm install playwright@1.56.1 --no-save --silent
          npx playwright install chromium --with-deps

      - name: Run team-odds scraper
        id: scrape
        run: node scripts/scrape-bookmakers.mjs
        continue-on-error: true

      - name: Run player-prop scraper
        id: props
        run: node scripts/scrape-player-props.mjs
        continue-on-error: true

      - name: Run per-match odds scraper (The Odds API)
        id: match_odds
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: node scripts/scrape-match-odds.mjs
        continue-on-error: true

      - name: Run forecast snapshot
        id: forecast
        run: node scripts/snapshot-forecast.mjs
        continue-on-error: true

      - name: Write freshness manifest
        id: freshness
        run: node scripts/write-freshness.mjs
        continue-on-error: true

      - name: Commit snapshots if changed
        if: steps.scrape.outcome == 'success' || steps.props.outcome == 'success' || steps.match_odds.outcome == 'success' || steps.forecast.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage every existing snapshot. `git add` catches both modified AND
          # new (untracked) files — the previous `git diff --quiet` check
          # silently skipped untracked files, so a freshly-created match-odds.json
          # never got committed even when the scraper succeeded.
          for f in data/market-snapshot.json data/player-props-2026.json data/match-odds.json data/title-history.json data/freshness.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh odds + props + forecast snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
